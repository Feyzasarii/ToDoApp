<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masterclass To-Do App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="app-container">
      <header>
        <h1>Günlük Planım</h1>
      </header>

      <section id="input-section">
        <label for="todo-input">Yeni Görev Ekle:</label>
        <div class="input-row">
          <input
            type="text"
            id="todo-input"
            placeholder="Ders çalış, spor yap..."
          />
          <button id="add-button">Ekle</button>
        </div>
      </section>

      <section id="list-section">
        <h2>Yapılacaklar</h2>
        <ul id="todo-list"></ul>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
